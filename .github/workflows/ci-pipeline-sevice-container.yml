name: CI Pipeline

on: 
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: node:18

    services:
      mongo:
        image: mongo:latest
      options: --name mongo

    env:
      MONGO_URI: 'mongodb://mongo:27017/superData'
      MONGO_USERNAME: non-prod-user
      MONGO_PASSWORD: non-prod-passowrd
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Cache node modules
      id: cache-npm
      uses: actions/cache@v3
      env:
        cache-name: cache-node-modules
      with:
        path: node_modules
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('package-lock.json') }}


    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm run test
