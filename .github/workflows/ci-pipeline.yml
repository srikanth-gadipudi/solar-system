
# Name: node js ci pipeline
# Description: This workflow is triggered on push to the main branch, pull requests to the main branch, and manually through workflow_dispatch. It builds, tests, and deploys a Node.js application using Docker.
# Triggers:
#   - push: Triggered on push to the main branch
#   - pull_request: Triggered on pull requests to the main branch
#   - workflow_dispatch: Manually triggered through workflow_dispatch
# Inputs:
#   - logLevel: The log level for the application. Default is 'warning'. Available options are 'info', 'warning', and 'debug'.
#   - tags: Test scenario tags. Optional.
# Environment variables:
#   - MONGO_URI: MongoDB connection URI.
#   - MONGO_USERNAME: MongoDB username.
#   - MONGO_PASSWORD: MongoDB password.
# Jobs:
#   - build: Builds and tests the Node.js application.
#     - Strategy:
#       - node: [18, 20]
#       - os: [ubuntu-latest]
#     - Steps:
#       - Checkout the code.
#       - Use the specified Node.js version.
#       - Cache node modules.
#       - Install dependencies and build the application.
#       - Run tests and generate test results.
#       - Archive test results as an artifact.
#   - code-coverage: Generates code coverage report.
#     - Strategy:
#       - node: [18, 20]
#       - os: [ubuntu-latest]
#     - Needs: [build]
#     - Steps:
#       - Checkout the code.
#       - Use the specified Node.js version.
#       - Cache node modules.
#       - Install dependencies and build the application.
#       - Run code coverage and generate report.
#       - Archive code coverage report as an artifact.
#   - Build-docker-image: Builds and pushes Docker image.
#     - Runs on: ubuntu-latest
#     - Needs: [build, code-coverage]
#     - Permissions:
#       - contents: read
#       - packages: write
#     - Steps:
#       - Checkout the code.
#       - Login to Docker Hub.
#       - Login to GHCR.
#       - Build Docker image.
#       - Run Docker image and perform tests.
#       - Build and push Docker image with tags.
#       - Cleanup Docker images.
name: node js ci pipeline
on:
  push:
    branches: 
        - main
  pull_request:
    branches:
        - main
  workflow_dispatch:
    inputs:
        logLevel:
            description: 'Log level'
            required: true
            default: 'warning'
            type: choice
            options:
            - info
            - warning
            - debug
        tags:
            description: 'Test scenario tags'
            required: false
            type: boolean
env:
    MONGO_URI: mongodb+srv://supercluster.d83jj.mongodb.net/superData
    MONGO_USERNAME: ${{ vars.MONGO_USERNAME }}
    MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}

jobs:
    build:
        strategy:
          matrix:
            node: [18,20]
            os: [ubuntu-latest]  
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v2
            - name: Use Node.js version ${{ matrix.node }}
              uses: actions/setup-node@v3
              with:
                node-version: ${{ matrix.node }}
            - name: Cache node modules
              id: cache-npm
              uses: actions/cache@v3
              env:
                cache-name: cache-node-modules
              with:
                path: node_modules
                key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('package-lock.json') }}
            - name: npm install and build
              run: npm install
            - name: run npm test
              id: generate-test-result
              run: npm run test
            - name: archive test artifact 
              uses: actions/upload-artifact@v3
              if: always()
              with:
                path: test-results.xml
                name: test-result-artifact-${{ matrix.node }}-${{ matrix.os }}
                retention-days: 5

    code-coverage:
        runs-on: ${{ matrix.os }}
        strategy:
          matrix:
            node: [18,20]
            os: [ubuntu-latest]  
        needs: [build]
        steps:
            - uses: actions/checkout@v2
            - name: Use Node.js version ${{ matrix.node }}
              uses: actions/setup-node@v3
              with:
                node-version: ${{ matrix.node }}
            - name: Cache node modules
              id: cache-npm
              uses: actions/cache@v3
              env:
                cache-name: cache-node-modules
              with:
                path: node_modules
                key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('package-lock.json') }}
            - name: npm install and build
              run: npm install
            - name: run npm coverage
              run: npm run coverage
            - name: archive coverage artifact 
              uses: actions/upload-artifact@v4
              if: always()
              with:
                name: coverage-artifact-${{ matrix.node }}-${{ matrix.os }}
                path: coverage
                retention-days: 5
      
    Build-docker-image:
      runs-on: ubuntu-latest
      needs: [build, code-coverage]
      permissions:
        contents: read
        packages: write
      steps:
        - name: Checkout code
          uses: actions/checkout@v2
        - name: login to docker hub 
          uses: docker/login-action@v2
          with:
            username: ${{ vars.DOCKER_USERNAME }}
            password: ${{ vars.DOCKERHUB_TOKEN }}
        - name: login to GHCR
          uses: docker/login-action@v2
          with:
            registry: ghcr.io
            username: ${{ github.repository_owner }}
            password: ${{ secrets.GITHUB_TOKEN }}
        - name: Build docker image
          uses: docker/build-push-action@v6
          with:
            push: false
            context: .
            tags: |
              ${{ vars.DOCKER_USERNAME }}/solar-system:latest
              ${{ vars.DOCKER_USERNAME }}/solar-system:${{ github.run_number }}
              ghcr.io/${{ github.repository_owner }}/solar-system:latest
              ghcr.io/${{ github.repository_owner }}/solar-system:${{ github.run_number }}
        - name: run docker image and test 
          run: |
              docker run --name=solar-system -d -p 3000:3000 \
                  -e MONGO_URI=${{ env.MONGO_URI }} \
                  -e MONGO_USERNAME=${{ env.MONGO_USERNAME }} \
                  -e MONGO_PASSWORD=${{ env.MONGO_PASSWORD }} \
                  ${{ vars.DOCKER_USERNAME }}/solar-system:latest
              export IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' solar-system)
              echo $IP
              echo checking container healthcheck using wget
              wget -q -O - 127.0.0.1:3000/live
        - name: Build and push
          uses: docker/build-push-action@v6
          with:
            push: true
            context: .
            tags: |
              ${{ vars.DOCKER_USERNAME }}/solar-system:latest
              ${{ vars.DOCKER_USERNAME }}/solar-system:${{ github.run_number }}
              ghcr.io/${{ github.repository_owner }}/solar-system:latest
              ghcr.io/${{ github.repository_owner }}/solar-system:${{ github.run_number }}
        - name: cleanup all the docker images
          run: docker rmi -f solar-system:${{ github.run_number }} ${{ vars.DOCKER_USERNAME }}/solar-system:${{ github.run_number }}


    kubectl-job:
      runs-on: ubuntu-latest
      needs: [Build-docker-image]
      steps:
        - name: Install kubectl
          uses: azure/kubectl@v4
          with:
            version: "1.26.0"

        - name: Get cluster information
          run: kubectl cluster-info
        - name: Get node information
          run: kubectl get nodes
